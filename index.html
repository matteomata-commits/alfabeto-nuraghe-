<!-- ===================== RUOTA DEI VANI / LETTERE (destra) ===================== -->

.slotglyph.empty{opacity:0.15;}
.slotlabel{font-family:serif; font-size:34px; font-weight:bold; fill:#3D3A33; pointer-events:none; user-select:none;}
</style>

<!-- ===================== MURO DI CINTA NURAGICO ===================== -->

<!-- ombra interna -->
<path d="
M 290 360
C 310 290, 350 260, 400 250
C 460 240, 510 245, 540 250
C 570 290, 580 360, 530 410
C 480 450, 400 460, 290 360
Z
"

/>

<!-- muro principale -->

"

<!-- SLOT A -->
<g onclick="posiziona('A')">
  <circle cx="440" cy="350" r="70" fill="#EDE8DC" stroke="#3D3A33"/>

  <g id="glyph-A" transform="translate(440,350)"></g>
</g>

<!-- ===================== LOGICA ===================== -->
<script>
let runeSelezionata = null;

function seleziona(lettera) {
  runeSelezionata = lettera;

  document.querySelectorAll('.runebtn').forEach(el => {
    el.classList.remove('selected');
  });

  const el = document.getElementById('pick-' + lettera);
  if (el) el.classList.add('selected');
}

function posiziona(slot) {
  if (!runeSelezionata) return;

  const target = document.getElementById('glyph-' + slot);
  const source = document.querySelector('#pick-' + runeSelezionata + ' .rune');

  if (!target || !source) return;

  target.innerHTML = "";

  const clone = source.cloneNode(true);
  clone.setAttribute("transform", "scale(0.6)");

  target.appendChild(clone);

  const label = document.getElementById('label-' + slot);
  if (label) label.style.display = "none";
}
</script>

</body>
