<div style="
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:50px;
  width:100%;
  margin:0 auto;
">

<!-- ===================== MAYA ===================== -->
<svg width="360" height="360" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

<style>
.rune{
  fill:none;
  stroke:#1C1A16;
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.stone{fill:none;stroke:#1C1A16;stroke-width:12;opacity:0.22;}
.inner{fill:none;stroke:#3D3A33;stroke-width:2;opacity:0.35;stroke-dasharray:4 10;}
.crack{fill:none;stroke:#2b2622;stroke-width:2;opacity:0.4;}
.symbol{fill:none;stroke:#1C1A16;stroke-width:3;opacity:0.85;}
</style>

<!-- cerchi -->
<circle cx="340" cy="340" r="250" class="stone"/>
<circle cx="340" cy="340" r="210" class="inner"/>

<!-- crepe -->
<path class="crack" d="M340 80 L360 150 L330 220 L350 310 L320 410 L360 520"/>
<path class="crack" d="M150 340 L240 300 L320 350 L420 320 L520 360"/>
<path class="crack" d="M240 180 L280 240 L260 320 L310 380"/>

<!-- HUB -->
<circle cx="340" cy="340" r="14" class="symbol"/>

<!-- NODI (stesso sistema del Nuragico) -->
<circle class="symbol" cx="340" cy="180" r="10"/>
<circle class="symbol" cx="190" cy="210" r="10"/>
<circle class="symbol" cx="300" cy="100" r="10"/>
<circle class="symbol" cx="440" cy="100" r="10"/>
<circle class="symbol" cx="430" cy="260" r="10"/>

<!-- connessioni -->
<line x1="340" y1="340" x2="340" y2="180" stroke="#3D3A33"/>
<line x1="340" y1="340" x2="190" y2="210" stroke="#3D3A33"/>
<line x1="340" y1="340" x2="300" y2="100" stroke="#3D3A33"/>
<line x1="340" y1="340" x2="440" y2="100" stroke="#3D3A33"/>
<line x1="340" y1="340" x2="430" y2="260" stroke="#3D3A33"/>

</svg>

<!-- ===================== NURAGICO ===================== -->
<svg width="360" height="360" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">

<style>
.wall{
  fill:none;
  stroke:#1C1A16;
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.rune{
  fill:none;
  stroke:#1C1A16;
  stroke-width:3;
}
.dot{fill:#1C1A16;}
</style>

<!-- linee verso centro -->
<line x1="190" y1="210" x2="340" y2="200" stroke="#3D3A33"/>
<line x1="300" y1="100" x2="340" y2="200" stroke="#3D3A33"/>
<line x1="440" y1="100" x2="340" y2="200" stroke="#3D3A33"/>
<line x1="430" y1="260" x2="340" y2="200" stroke="#3D3A33"/>
<line x1="340" y1="200" x2="190" y2="210" stroke="#3D3A33"/>

<!-- muro -->
<path d="
M 190 210
C 210 140, 250 110, 300 100
C 360 90, 410 95, 440 100
C 470 140, 480 210, 430 260
C 380 300, 300 310, 190 210
Z"
class="wall"/>

<!-- SLOT A -->
