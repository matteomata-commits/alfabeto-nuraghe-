<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>

<style>
body {
  margin: 0;
  background: #F4F0E6;
  font-family: serif;
  text-align: center;
}

h2 { margin: 20px 0 5px; }

#wrap {
  position: relative;
  width: 1400px;
  max-width: 100%;
  margin: auto;
}

/* immagine base */
#base {
  width: 100%;
  height: auto;
  display: block;
}

/* overlay SVG sopra immagine */
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* rune */
.runeBtn {
  cursor: pointer;
}

.hit {
  fill: rgba(0,0,0,0.01);
  stroke: rgba(0,0,0,0.2);
  stroke-width: 2;
}

.runeBtn:hover .hit {
  fill: rgba(156,58,29,0.12);
}

.runeBtn.selected .hit {
  fill: rgba(29,122,93,0.20);
  stroke: #1d7a5c;
}
</style>
</head>

<body>

<h2>DEMOCODEX</h2>

<div id="wrap">

  <!-- ================= IMMAGINE BASE ================= -->
  <img id="base" src="Interfaccia mistica DEMOCODEX interattiva.png">

  <!-- ================= OVERLAY ================= -->
  <svg id="overlay" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMid meet">

    <script>
      let selectedRune = null;

      function selectRune(id){
        selectedRune = id;

        document.querySelectorAll('.runeBtn').forEach(e => e.classList.remove('selected'));
        document.getElementById('rune-' + id).classList.add('selected');
      }

      function placeRune(slot){
        if(!selectedRune) return;

        const source = document.querySelector('#rune-' + selectedRune + ' .symbol');
        const target = document.getElementById('slot-' + slot);

        if(!source || !target) return;

        target.innerHTML = "";

        const clone = source.cloneNode(true);
        clone.setAttribute("transform","scale(0.85)");

        target.appendChild(clone);
      }
    </script>

    <!-- ================= 9 RUNE ================= -->

    <g id="rune-A" class="runeBtn" onclick="selectRune('A')" transform="translate(340,230)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-14,-22 L14,-22 L14,-6 L-14,-6 L-14,12 L14,12"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-B" class="runeBtn" onclick="selectRune('B')" transform="translate(520,170)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L0,-20 L0,0 L16,0 L16,20"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-C" class="runeBtn" onclick="selectRune('C')" transform="translate(600,340)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L-16,20 M-16,-20 L16,-20 M-16,0 L12,0"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-D" class="runeBtn" onclick="selectRune('D')" transform="translate(520,510)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L16,-20 L16,0 L-16,0 L-16,20 L16,20"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-E" class="runeBtn" onclick="selectRune('E')" transform="translate(340,580)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-14,-22 L14,-22 L14,-6 L-14,-6 L-14,12 L14,12"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-F" class="runeBtn" onclick="selectRune('F')" transform="translate(160,510)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L0,-20 L0,0 L16,0 L16,20"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-G" class="runeBtn" onclick="selectRune('G')" transform="translate(80,340)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L-16,20 M-16,-20 L16,-20 M-16,0 L12,0"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-H" class="runeBtn" onclick="selectRune('H')" transform="translate(160,170)">
      <circle class="hit" r="45"/>
      <g class="symbol">
        <path d="M-16,-20 L16,-20 L16,0 L-16,0 L-16,20 L16,20"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <g id="rune-I" class="runeBtn" onclick="selectRune('I')" transform="translate(340,340)">
      <circle class="hit" r="55"/>
      <g class="symbol">
        <path d="M0,-20 L0,20 M-18,0 L18,0"
              fill="none" stroke="#1C1A16" stroke-width="5"/>
      </g>
    </g>

    <!-- ================= SLOT ================= -->

    <g onclick="placeRune('A')">
      <circle cx="1100" cy="330" r="60" fill="transparent"/>
      <g id="slot-A"></g>
    </g>

    <g onclick="placeRune('B')">
      <circle cx="980" cy="250" r="55" fill="transparent"/>
      <g id="slot-B"></g>
    </g>

    <g onclick="placeRune('C')">
      <circle cx="1220" cy="250" r="55" fill="transparent"/>
      <g id="slot-C"></g>
    </g>

    <g onclick="placeRune('D')">
      <circle cx="980" cy="450" r="55" fill="transparent"/>
      <g id="slot-D"></g>
    </g>

    <g onclick="placeRune('E')">
      <circle cx="1220" cy="450" r="55" fill="transparent"/>
      <g id="slot-E"></g>
    </g>

  </svg>

</div>

</body>
</html>
