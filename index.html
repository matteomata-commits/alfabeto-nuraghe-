<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>
</head>

<body style="background-color:#F4F0E6; font-family:serif; text-align:center; margin-top:30px;">

<h2>DEMOCODEX</h2>

<p style="color:#555; font-size:14px;">
1. scegli una runa → 2. tocca il vano dove vuoi inserirla
</p>

<div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap;">

<!-- ===================== RUOTA ===================== -->
<svg width="400" height="400" viewBox="0 0 680 680">

<style>
.runebtn { cursor:pointer; }
.rune { fill:none; stroke:#1C1A16; stroke-width:6; }
.hit {
  fill: rgba(28,26,22,0.05);
  stroke: rgba(28,26,22,0.2);
  stroke-width:2;
}

.runebtn:hover .hit { fill: rgba(156,58,29,0.12); }
.runebtn.selected .hit { fill: rgba(29,122,93,0.18); stroke:#1d7a5c; }
</style>

<!-- cerchi stile antico -->
<circle cx="340" cy="340" r="300" fill="none" stroke="#3D3A33" stroke-width="6"/>
<circle cx="340" cy="340" r="250" fill="none" stroke="#3D3A33" stroke-width="2" opacity="0.5"/>

<!-- RUNA A -->
<g id="pick-A" class="runebtn" onclick="seleziona('A')" transform="translate(340,150)">
  <circle class="hit" r="55"></circle>
  <g class="rune">
    <path d="M-16,-26 L16,-26 L16,-6 L-16,-6 L-16,14 L16,14"/>
  </g>
</g>

<!-- RUNA B -->
<g id="pick-B" class="runebtn" onclick="seleziona('B')" transform="translate(490,220)">
  <circle class="hit" r="55"></circle>
  <g class="rune">
    <path d="M-18,-24 L0,-24 L0,0 L18,0 L18,24"/>
  </g>
</g>

<!-- RUNA C -->
<g id="pick-C" class="runebtn" onclick="seleziona('C')" transform="translate(540,340)">
  <circle class="hit" r="55"></circle>
  <g class="rune">
    <path d="M-18,-24 L-18,24 M-18,-24 L18,-24 M-18,0 L14,0"/>
  </g>
</g>

<!-- RUNA D -->
<g id="pick-D" class="runebtn" onclick="seleziona('D')" transform="translate(490,460)">
  <circle class="hit" r="55"></circle>
  <g class="rune">
    <path d="M-18,-24 L18,-24 L18,0 L-18,0 L-18,24 L18,24"/>
  </g>
</g>

<!-- RUNA E -->
<g id="pick-E" class="runebtn" onclick="seleziona('E')" transform="translate(340,530)">
  <circle class="hit" r="55"></circle>
  <g class="rune">
    <path d="M-16,-26 L16,-26 L16,-6 L-16,-6 L-16,14 L16,14"/>
  </g>
</g>

</svg>

<!-- ===================== SLOT ===================== -->
<svg width="400" height="400" viewBox="0 0 680 680">

<style>
.slotlabel {
  font-family:serif;
  font-size:34px;
  font-weight:bold;
  fill:#3D3A33;
  pointer-events:none;
}
</style>

<g onclick="posiziona('A')">
  <circle cx="440" cy="350" r="70" fill="#EDE8DC" stroke="#3D3A33"/>
  <text id="label-A" class="slotlabel" x="440" y="364" text-anchor="middle">A</text>
  <g id="glyph-A" transform="translate(440,350)"></g>
</g>

<g onclick="posiziona('B')">
  <circle cx="290" cy="360" r="52" fill="#EDE8DC" stroke="#3D3A33"/>
  <text id="label-B" class="slotlabel" x="290" y="374" text-anchor="middle">B</text>
  <g id="glyph-B" transform="translate(290,360)"></g>
</g>

<g onclick="posiziona('C')">
  <circle cx="400" cy="250" r="42" fill="#EDE8DC" stroke="#3D3A33"/>
  <text id="label-C" class="slotlabel" x="400" y="264" text-anchor="middle">C</text>
  <g id="glyph-C" transform="translate(400,250)"></g>
</g>

</svg>

</div>

<script>
let runeSelezionata = null;

function seleziona(lettera) {
  runeSelezionata = lettera;

  document.querySelectorAll('.runebtn').forEach(el => {
    el.classList.remove('selected');
  });

  document.getElementById('pick-' + lettera).classList.add('selected');
}

function posiziona(slot) {
  if (!runeSelezionata) return;

  const source = document.getElementById('pick-' + runeSelezionata);
  const target = document.getElementById('glyph-' + slot);

  if (!source || !target) return;

  target.innerHTML = "";

  // 🔥 FIX IMPORTANTE: clono tutto il gruppo
  const clone = source.querySelector('.rune').cloneNode(true);

  clone.setAttribute("transform", "scale(0.7)");

  target.appendChild(clone);

  const label = document.getElementById('label-' + slot);
  if (label) label.style.display = "none";
}
</script>

</body>
</html>
