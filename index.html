<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>

<style>
body{
  background:#F4F0E6;
  font-family:serif;
  text-align:center;
}

.container{
  display:flex;
  justify-content:center;
  gap:60px;
  margin-top:20px;
}

/* ================= SINISTRA CERCHIO MISTICO ================= */

.circleWrap{
  width:420px;
  height:420px;
  position:relative;
}

/* cerchio stile pietra/granaio */
.mysticCircle{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle at center,
    #e6dcc6 0%,
    #c2b49a 45%,
    #8c7d66 100%);
  border:8px solid #3d3a33;
  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.4),
    0 0 20px rgba(0,0,0,0.2);
  position:relative;
}

/* rune posizionate a cerchio */
.rune{
  width:60px;
  position:absolute;
  cursor:pointer;
  transform:translate(-50%,-50%);
}

/* posizioni circolari */
.p1{ top:10%; left:50%; }
.p2{ top:25%; left:80%; }
.p3{ top:50%; left:90%; }
.p4{ top:75%; left:80%; }
.p5{ top:90%; left:50%; }
.p6{ top:75%; left:20%; }
.p7{ top:50%; left:10%; }
.p8{ top:25%; left:20%; }

/* ================= DESTRA SLOT ================= */

.slot{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid #3D3A33;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:15px auto;
  background:#EDE8DC;
  font-size:24px;
}
</style>

</head>

<body>

<h2>DEMOCODEX</h2>
<p>1. scegli runa → 2. clicca slot</p>

<div class="container">

<!-- ================= SINISTRA CERCHIO ================= -->
<div class="circleWrap">
  <div class="mysticCircle">

    <img src="piramide.png" class="rune p1" onclick="selectRune('piramide')">
    <img src="serpente.png" class="rune p2" onclick="selectRune('serpente')">
    <img src="macedonia.png" class="rune p3" onclick="selectRune('macedonia')">
    <img src="macchina.png" class="rune p4" onclick="selectRune('macchina')">
    <img src="stargate.png" class="rune p5" onclick="selectRune('stargate')">
    <img src="mango.png" class="rune p6" onclick="selectRune('mango')">
    <img src="cerchio.png" class="rune p7" onclick="selectRune('cerchio')">
    <img src="arancia.png" class="rune p8" onclick="selectRune('arancia')">

  </div>
</div>

<!-- ================= DESTRA SLOT ================= -->
<div class="panel">

<div class="slot" onclick="placeRune('A')" id="A">A</div>
<div class="slot" onclick="placeRune('B')" id="B">B</div>
<div class="slot" onclick="placeRune('C')" id="C">C</div>
<div class="slot" onclick="placeRune('D')" id="D">D</div>
<div class="slot" onclick="placeRune('E')" id="E">E</div>

</div>

</div>

<br>

<button onclick="invia()">INVIA</button>
<button onclick="reset()">RESET</button>

<p id="codice"></p>
<div id="output"></div>

<script>

let selectedRune = null;

let slotState = {A:null,B:null,C:null,D:null,E:null};

function selectRune(id){
  selectedRune = id;
}

function placeRune(slot){

  if(!selectedRune) return;

  slotState[slot] = selectedRune;

  document.getElementById(slot).innerHTML =
    "<img src='" + selectedRune + ".png' width='60'>";
}

/* POESIE */
const poesie = {

  "piramideserpente": {
    titolo: "Porta Antica",
    testo: "La pietra si apre solo a chi conosce il segno."
  },

  "serpentepiramide": {
    titolo: "Frutto del tempo",
    testo: "Il serpente guida la piramide verso il destino."
  },

  "piramideserpentemacedoniamacchinastargate": {
    titolo: "Codice Madre",
    testo: "Hai attivato la sequenza originaria del DEMOCODEX."
  }

};

function invia(){

  const codice =
    (slotState.A||"") +
    (slotState.B||"") +
    (slotState.C||"") +
    (slotState.D||"") +
    (slotState.E||"");

  document.getElementById("codice").innerText = "Codice: " + codice;

  const poesia = poesie[codice];
  const output = document.getElementById("output");

  if(poesia){
    output.innerHTML =
      "<h3>"+poesia.titolo+"</h3>" +
      "<pre style='white-space:pre-wrap;font-size:18px;'>"+poesia.testo+"</pre>";
  } else {
    output.innerHTML = "❌ nessuna poesia per questa combinazione";
  }
}

function reset(){

  selectedRune = null;
  slotState = {A:null,B:null,C:null,D:null,E:null};

  ["A","B","C","D","E"].forEach(s=>{
    document.getElementById(s).innerHTML = s;
  });

  document.getElementById("codice").innerText = "";
  document.getElementById("output").innerHTML = "";
}

</script>

</body>
</html>
