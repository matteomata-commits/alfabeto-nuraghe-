<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>
</head>

<body style="background-color:#F4F0E6 !important; font-family:serif; text-align:center; margin-top:30px;">

<h2>DEMOCODEX</h2>

<p style="color:#555; font-size:14px;">
1. scegli una runa → 2. tocca il vano dove vuoi inserirla
</p>

<!-- ===================== CONTAINER SUPERIORE (2 MAPPE) ===================== -->
<div style="display:flex; justify-content:center; gap:40px; align-items:flex-start;">

<!-- ===================== MAYA (SINISTRA) ===================== -->
<svg width="340" height="340" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

<style>
.runebtn{cursor:pointer;}
.runebtn:hover .rune{stroke:#9c3a1d;}
.runebtn.selected .rune{stroke:#1d7a5c;}

.rune{
  fill:none;
  stroke:#1C1A16;
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.dot{fill:#1C1A16;}

.stone-ring{fill:none;stroke:#1C1A16;stroke-width:10;opacity:0.25;}
.crack{fill:none;stroke:#3D3A33;stroke-width:2;opacity:0.35;stroke-dasharray:3 6;}
</style>

<circle cx="340" cy="340" r="250" class="stone-ring"/>
<circle cx="340" cy="340" r="190" fill="none" stroke="#3D3A33" stroke-width="2" opacity="0.3" stroke-dasharray="6 12"/>

<path class="crack" d="M340 90 L360 160 L320 230 L350 300 L330 380 L360 470"/>
<path class="crack" d="M160 340 L240 320 L310 360 L400 330 L520 350"/>
<path class="crack" d="M220 160 L280 210 L260 280 L300 340 L270 420"/>

<!-- rune Maya -->
<g id="pick-A" class="runebtn" onclick="seleziona('A')" transform="translate(340,85)">
<path class="rune" d="M-16,-26 L16,-26 L16,-6 L-16,-6 L-16,14 L16,14"/>
<circle class="dot" cx="0" cy="-16" r="3.5"/>
<circle class="dot" cx="0" cy="4" r="3.5"/>
</g>

<!-- (puoi lasciare gli altri identici come prima o duplicare pattern) -->

</svg>

<!-- ===================== NURAGICO (DESTRA) ===================== -->
<svg width="340" height="340" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">

<style>
.slotstone{fill:#EDE8DC;stroke:#3D3A33;stroke-width:1.4;cursor:pointer;}

.runebtn{cursor:pointer;}
.runebtn:hover .rune{stroke:#9c3a1d;}
.runebtn.selected .rune{stroke:#1d7a5c;}

.rune{fill:none;stroke:#1C1A16;stroke-width:6;}
.dot{fill:#1C1A16;}
</style>

<!-- CINTA NURAGICA -->
<path d="
M 190 210
C 210 140, 250 110, 300 100
C 360 90, 410 95, 440 100
C 470 140, 480 210, 430 260
C 380 300, 300 310, 190 210
Z
"
fill="none"
stroke="#1C1A16"
stroke-width="6"
stroke-linecap="round"
stroke-linejoin="round"/>

<!-- slot -->
<g onclick="posiziona('A')">
  <circle cx="340" cy="200" r="70" fill="#EDE8DC" stroke="#3D3A33"/>
  <text x="340" y="148" text-anchor="middle">A</text>
  <g id="glyph-A" transform="translate(340,200)"></g>
</g>

<g onclick="posiziona('B')">
  <circle cx="190" cy="210" r="52" fill="#EDE8DC" stroke="#3D3A33"/>
  <text x="190" y="168" text-anchor="middle">B</text>
  <g id="glyph-B" transform="translate(190,210)"></g>
</g>

<g onclick="posiziona('C')">
  <circle cx="300" cy="100" r="42" fill="#EDE8DC" stroke="#3D3A33"/>
  <text x="300" y="66" text-anchor="middle">C</text>
  <g id="glyph-C" transform="translate(300,100)"></g>
</g>

<g onclick="posiziona('D')">
  <circle cx="440" cy="100" r="48" fill="#EDE8DC" stroke="#3D3A33"/>
  <text x="440" y="62" text-anchor="middle">D</text>
  <g id="glyph-D" transform="translate(440,100)"></g>
</g>

<g onclick="posiziona('E')">
  <circle cx="430" cy="260" r="40" fill="#EDE8DC" stroke="#3D3A33"/>
  <text x="430" y="228" text-anchor="middle">E</text>
  <g id="glyph-E" transform="translate(430,260)"></g>
</g>

</svg>

</div>

<!-- ===================== RUNES SOTTO ===================== -->
<br>

<svg width="300" height="300" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

<style>
.runebtn{cursor:pointer;}
.runebtn:hover .rune{stroke:#9c3a1d;}
.runebtn.selected .rune{stroke:#1d7a5c;}
.rune{fill:none;stroke:#1C1A16;stroke-width:6;}
.dot{fill:#1C1A16;}
</style>

<!-- rune esempi -->
<g id="pick-A" class="runebtn" onclick="seleziona('A')" transform="translate(340,156)">
<path class="rune" d="M-16,-26 L16,-26 L16,-6 L-16,-6 L-16,14 L16,14"/>
</g>

<g id="pick-B" class="runebtn" onclick="seleziona('B')" transform="translate(456,210)">
<path class="rune" d="M-18,-24 L0,-24 L0,0 L18,0 L18,24"/>
</g>

</svg>

<!-- ===================== LOGICA ===================== -->
<script>
let runeSelezionata = null;

function seleziona(lettera) {
  runeSelezionata = lettera;

  document.querySelectorAll('.runebtn').forEach(el => {
    el.classList.remove('selected');
  });

  const el = document.getElementById('pick-' + lettera);
  if (el) el.classList.add('selected');
}

function posiziona(slot) {
  if (!runeSelezionata) return;

  const target = document.getElementById('glyph-' + slot);
  const source = document.querySelector('#pick-' + runeSelezionata + ' .rune');

  if (!target || !source) return;

  target.innerHTML = "";

  const clone = source.cloneNode(true);
  clone.setAttribute("transform", "scale(0.6)");

  target.appendChild(clone);
}
</script>

</body>
</html>
